# Libra self-host on the VPS — routed through the box's existing Traefik
# (letsencrypt HTTP-01, :80/:443). No published ports on `web`: Traefik
# (host network) reaches the container directly on libra_default.
#   docker compose -p libra -f docker-compose.vps.yml --env-file .env.production up -d --build
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-libra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-libra}
    volumes:
      - libra-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-libra}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - libra-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: libra-web:prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      SELF_HOSTED: "true"
      AUTH_DB_PATH: /data/auth.db
      REDIS_URL: redis://redis:6379
    volumes:
      - libra-auth-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1536M
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=libra_default"
      - "traefik.http.routers.libra.rule=Host(`libra.agentic-lab.io`)"
      - "traefik.http.routers.libra.entrypoints=websecure"
      - "traefik.http.routers.libra.tls=true"
      - "traefik.http.routers.libra.tls.certresolver=letsencrypt"
      - "traefik.http.services.libra.loadbalancer.server.port=3000"

volumes:
  libra-postgres-data:
  libra-redis-data:
  libra-auth-data:
